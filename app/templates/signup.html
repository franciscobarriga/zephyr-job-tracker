{% extends "base.html" %}

{% block title %}Create account — Zephyr{% endblock %}

{% block content %}
<div class="auth-wrap">
    <div class="auth-card">
        <div class="auth-brand">
            <span class="brand-mark">Z</span>
            Zephyr
        </div>
        <h1 class="auth-title">Create your account</h1>
        <p class="auth-sub">Track every application. Match every job to your resume.</p>

        <form method="POST" action="/auth/signup" class="auth-form">
            <div class="field">
                <label class="label" for="email">Email</label>
                <input class="input" type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email" autofocus>
            </div>
            <div class="field">
                <label class="label" for="username">Username</label>
                <input class="input" type="text" id="username" name="username" placeholder="janedoe" required autocomplete="username">
            </div>
            <div class="field">
                <label class="label" for="full_name">Full name <span class="label-hint">optional</span></label>
                <input class="input" type="text" id="full_name" name="full_name" placeholder="Jane Doe" autocomplete="name">
            </div>
            <div class="field">
                <label class="label" for="password">Password <span class="label-hint">min 6 chars</span></label>
                <input class="input" type="password" id="password" name="password" required minlength="6" autocomplete="new-password">
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;">Create account <i class="bi bi-arrow-right"></i></button>
        </form>

        <div class="auth-footer">
            Already have an account? <a href="/auth/login">Sign in</a>
        </div>
    </div>
</div>
{% endblock %}
