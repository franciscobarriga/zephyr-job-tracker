{% extends "base.html" %}

{% block title %}Sign in — Zephyr{% endblock %}

{% block content %}
<div class="auth-wrap">
    <div class="auth-card">
        <div class="auth-brand">
            <span class="brand-mark">Z</span>
            Zephyr
        </div>
        <h1 class="auth-title">Welcome back</h1>
        <p class="auth-sub">Sign in to your account.</p>

        <form method="POST" action="/auth/login" class="auth-form">
            <div class="field">
                <label class="label" for="email">Email</label>
                <input class="input" type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email" autofocus>
            </div>
            <div class="field">
                <label class="label" for="password">Password</label>
                <input class="input" type="password" id="password" name="password" placeholder="Your password" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;">Sign in <i class="bi bi-arrow-right"></i></button>
        </form>

        <div class="auth-footer">
            New here? <a href="/auth/signup">Create an account</a>
        </div>
    </div>
</div>
{% endblock %}
