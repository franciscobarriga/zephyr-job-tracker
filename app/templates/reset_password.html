{% extends "base.html" %}

{% block title %}Set new password — Zephyr{% endblock %}

{% block content %}
<div class="auth-wrap">
    <div class="auth-card">
        <div class="auth-brand">
            <span class="brand-mark">Z</span>
            Zephyr
        </div>
        <h1 class="auth-title">Set a new password</h1>
        <p class="auth-sub">Choose something you'll remember.</p>

        <div class="banner banner-danger" id="error-banner" style="display:none;margin-bottom:18px;">
            <i class="bi bi-exclamation-circle"></i> <span id="error-text"></span>
        </div>
        <div class="banner banner-success" id="success-banner" style="display:none;margin-bottom:18px;">
            <i class="bi bi-check-circle"></i> Password updated. Taking you to sign in...
        </div>

        <form class="auth-form" id="reset-form">
            <div class="field">
                <label class="label" for="password">New password <span class="label-hint">min 6 chars</span></label>
                <input class="input" type="password" id="password" minlength="6" required autofocus autocomplete="new-password">
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;" id="submit-btn">
                Update password <i class="bi bi-arrow-right"></i>
            </button>
        </form>

        <div id="missing-token" class="text-muted text-sm" style="display:none;text-align:center;margin-top:18px;">
            No reset token found. <a href="/auth/forgot-password" style="color:var(--accent);">Request a new link.</a>
        </div>

        <div class="auth-footer">
            <a href="/auth/login">Back to sign in</a>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function () {
    var form = document.getElementById('reset-form');
    var errBanner = document.getElementById('error-banner');
    var errText = document.getElementById('error-text');
    var okBanner = document.getElementById('success-banner');
    var btn = document.getElementById('submit-btn');

    // No recovery token in the URL? Nothing to do.
    if (!window.location.hash || window.location.hash.indexOf('access_token') === -1) {
        form.style.display = 'none';
        document.getElementById('missing-token').style.display = 'block';
        return;
    }

    // supabase-js auto-detects the recovery session from the URL hash on init.
    var sb = supabase.createClient(
        "{{ supabase_url }}",
        "{{ supabase_anon_key }}"
    );

    form.addEventListener('submit', async function (e) {
        e.preventDefault();
        errBanner.style.display = 'none';
        btn.disabled = true;
        btn.innerHTML = 'Updating...';
        var pw = document.getElementById('password').value;
        try {
            var res = await sb.auth.updateUser({ password: pw });
            if (res.error) {
                errText.textContent = res.error.message + ' Request a fresh link if this keeps happening.';
                errBanner.style.display = 'flex';
                btn.disabled = false;
                btn.innerHTML = 'Update password <i class="bi bi-arrow-right"></i>';
                return;
            }
            await sb.auth.signOut();
            form.style.display = 'none';
            okBanner.style.display = 'flex';
            setTimeout(function () { window.location.href = '/auth/login'; }, 1800);
        } catch (err) {
            errText.textContent = 'Something went wrong. Request a fresh reset link.';
            errBanner.style.display = 'flex';
            btn.disabled = false;
            btn.innerHTML = 'Update password <i class="bi bi-arrow-right"></i>';
        }
    });
})();
</script>
{% endblock %}
