{% extends "base.html" %}

{% block title %}Set new password — Zephyr{% endblock %}

{% block content %}
<div class="auth-wrap">
    <div class="auth-card">
        <div class="auth-brand">
            <span class="brand-mark">Z</span>
            Zephyr
        </div>
        <h1 class="auth-title">Set a new password</h1>
        <p class="auth-sub">Choose something you'll remember.</p>

        {% if error %}
        <div class="banner banner-danger" style="margin-bottom:18px;">
            <i class="bi bi-exclamation-circle"></i> {{ error }}
        </div>
        {% endif %}

        <form method="POST" action="/auth/reset-password" class="auth-form" id="reset-form">
            <input type="hidden" name="access_token" id="access_token">
            <input type="hidden" name="refresh_token" id="refresh_token">
            <div class="field">
                <label class="label" for="password">New password <span class="label-hint">min 6 chars</span></label>
                <input class="input" type="password" id="password" name="password" minlength="6" required autofocus autocomplete="new-password">
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;" id="submit-btn" disabled>
                Update password <i class="bi bi-arrow-right"></i>
            </button>
        </form>

        <div id="missing-token" class="text-muted text-sm" style="display:none;text-align:center;margin-top:18px;">
            No reset token found. <a href="/auth/forgot-password" style="color:var(--accent);">Request a new link.</a>
        </div>

        <div class="auth-footer">
            <a href="/auth/login">Back to sign in</a>
        </div>
    </div>
</div>

<script>
// Supabase puts the tokens in the URL hash (#access_token=...&refresh_token=...&type=recovery)
// because they are sensitive. We pull them out, stuff them into hidden inputs, and submit.
(function() {
    var hash = window.location.hash.startsWith('#') ? window.location.hash.slice(1) : '';
    var params = new URLSearchParams(hash);
    var at = params.get('access_token');
    var rt = params.get('refresh_token');
    if (at && rt) {
        document.getElementById('access_token').value = at;
        document.getElementById('refresh_token').value = rt;
        document.getElementById('submit-btn').disabled = false;
    } else {
        document.getElementById('reset-form').style.display = 'none';
        document.getElementById('missing-token').style.display = 'block';
    }
})();
</script>
{% endblock %}
